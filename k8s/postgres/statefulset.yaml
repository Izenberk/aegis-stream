apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aegis-postgres
spec:
  serviceName: aegis-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aegis-postgres
  template:
    metadata:
      labels:
        app: aegis-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: aegis-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
