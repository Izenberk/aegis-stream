# === Client Port ===
# This is where aegis-stream and consumer connect.
# Inside K8s, they reach it via: nats://aegis-nats:4222
port: 4222

# === HTTP Monitoring ===
# Exposes /healthz, /varz, /jsz endpoints.
# Useful for liveness probes and debugging JetStream state.
http_port: 8222

# === JetStream ===
# Enables persistent message storage. Without this block,
# NATS runs in Core mode (fire-and-forget, no durability).
jetstream {
  # Where stream data is written on disk.
  # Backed by the PVC in the StatefulSet — survives pod restarts.
  store_dir: /data/jetstream

  # Memory limit for streams using MemoryStorage.
  # We use FileStorage, but NATS still needs a memory budget
  # for caching and internal buffers.
  max_memory_store: 256MB

  # Disk limit for all JetStream streams on this node.
  # Once hit, oldest messages get evicted (if retention policy allows)
  # or new publishes are rejected.
  max_file_store: 1GB
}

# === Cluster ===
# Enables multi-node NATS clustering. Each node connects to all
# others on port 6222 (separate from the 4222 client port).
# StatefulSet gives each pod a predictable DNS name:
#   aegis-nats-0.aegis-nats.default.svc.cluster.local
#   aegis-nats-1.aegis-nats.default.svc.cluster.local
#   aegis-nats-2.aegis-nats.default.svc.cluster.local
# JetStream automatically replicates stream data across nodes.
cluster {
  name: aegis
  port: 6222

  routes [
    nats-route://aegis-nats-0.aegis-nats.default.svc.cluster.local:6222
    nats-route://aegis-nats-1.aegis-nats.default.svc.cluster.local:6222
    nats-route://aegis-nats-2.aegis-nats.default.svc.cluster.local:6222
  ]
}
