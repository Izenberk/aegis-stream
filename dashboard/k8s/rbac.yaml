apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-dashboard
  namespace: default
---
# Role (not ClusterRole) — scoped to the default namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-dashboard
  namespace: default
rules:
  - apiGroups: ["aegis.io"]
    resources: ["aegispipelines"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-dashboard
  namespace: default
subjects:
  - kind: ServiceAccount
    name: aegis-dashboard
    namespace: default
roleRef:
  kind: Role
  name: aegis-dashboard
  apiGroup: rbac.authorization.k8s.io
