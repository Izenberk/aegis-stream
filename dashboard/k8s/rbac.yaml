apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-dashboard
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegis-dashboard
rules:
  - apiGroups: ["aegis.io"]
    resources: ["aegispipelines"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aegis-dashboard
subjects:
  - kind: ServiceAccount
    name: aegis-dashboard
    namespace: default
roleRef:
  kind: ClusterRole
  name: aegis-dashboard
  apiGroup: rbac.authorization.k8s.io
